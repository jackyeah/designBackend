<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 - 後台管理系統</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-page">
  <div class="login-shapes">
    <div class="login-shape square" style="left:6%; width:34px; height:34px; animation-duration:16s; animation-delay:0s;"></div>
    <div class="login-shape circle" style="left:14%; width:22px; height:22px; animation-duration:12s; animation-delay:2s;"></div>
    <div class="login-shape diamond" style="left:22%; width:26px; height:26px; animation-duration:19s; animation-delay:5s;"></div>
    <div class="login-shape circle" style="left:31%; width:16px; height:16px; animation-duration:10s; animation-delay:1s;"></div>
    <div class="login-shape square" style="left:40%; width:20px; height:20px; animation-duration:14s; animation-delay:7s;"></div>
    <div class="login-shape diamond" style="left:49%; width:30px; height:30px; animation-duration:17s; animation-delay:3s;"></div>
    <div class="login-shape circle" style="left:58%; width:24px; height:24px; animation-duration:13s; animation-delay:6s;"></div>
    <div class="login-shape square" style="left:67%; width:28px; height:28px; animation-duration:20s; animation-delay:0.5s;"></div>
    <div class="login-shape circle" style="left:75%; width:18px; height:18px; animation-duration:11s; animation-delay:4s;"></div>
    <div class="login-shape diamond" style="left:83%; width:22px; height:22px; animation-duration:15s; animation-delay:8s;"></div>
    <div class="login-shape square" style="left:90%; width:16px; height:16px; animation-duration:12s; animation-delay:2.5s;"></div>
    <div class="login-shape circle" style="left:4%; width:14px; height:14px; animation-duration:18s; animation-delay:9s;"></div>
    <div class="login-shape diamond" style="left:55%; width:18px; height:18px; animation-duration:9s; animation-delay:1.5s;"></div>
    <div class="login-shape square" style="left:96%; width:24px; height:24px; animation-duration:16s; animation-delay:6.5s;"></div>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark"><img src="images/logo.png" alt="金錢母"></div>
      <div class="login-title">登入</div>
      <div class="login-subtitle">後台管理系統</div>
    </div>

    <form class="login-form">
      <div class="field">
        <label class="field-label"><span class="required">*</span>帳號</label>
        <input class="input" type="text" value="master" placeholder="請輸入帳號">
      </div>
      <div class="field">
        <label class="field-label"><span class="required">*</span>密碼</label>
        <input class="input" type="password" value="password123" placeholder="請輸入密碼">
      </div>
      <a class="btn btn-primary login-submit" href="pages/sub-accounts.html">送出</a>
    </form>

    <div class="login-footer">版本 1.26.3</div>
  </div>
</div>

</body>
</html>
