<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增副標題及內文 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'copywriting-subtitle-add', label: '新增副標題及內文', href: 'copywriting-subtitle-add.html' };
  window.PAGE_BREADCRUMB = ['網站管理', '文案管理', '新增副標題及內文'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="site" data-subactive="copywriting"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header">
        <h1>新增副標題及內文</h1>
        <a class="btn btn-secondary btn-sm" href="copywriting.html">返回列表</a>
      </div>

      <div class="context-trail mb-4">
        <span class="context-trail-item"><span class="context-trail-label">站台</span><span class="context-trail-value">金錢母</span></span>
        <span class="context-trail-sep">›</span>
        <span class="context-trail-item"><span class="context-trail-label">文案頁面</span><span class="context-trail-value">幫助中心</span></span>
        <span class="context-trail-sep">›</span>
        <span class="context-trail-item"><span class="context-trail-label">主標題</span><span class="context-trail-value">YZ-使用指南</span></span>
      </div>

      <div class="card">
        <div class="card-section">
          <div class="form-grid" style="grid-template-columns: 1fr 140px 140px;">
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>副標題</label>
              <input class="input" type="text" placeholder="請輸入副標題文字">
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>排序</label>
              <input class="input" type="number" value="1">
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>狀態</label>
              <div class="select-wrap"><select class="select"><option>啟用</option><option>停用</option></select></div>
            </div>
          </div>
        </div>

        <div class="card-section">
          <div class="card-section-title">內文</div>
          <div class="editor-toolbar">
            <button class="editor-btn" type="button" style="font-weight:700;">B</button>
            <button class="editor-btn" type="button" style="font-style:italic;">I</button>
            <button class="editor-btn" type="button" style="text-decoration:underline;">U</button>
            <span class="editor-toolbar-sep"></span>
            <button class="editor-btn" type="button">H1</button>
            <button class="editor-btn" type="button">H2</button>
            <span class="editor-toolbar-sep"></span>
            <button class="editor-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </button>
            <button class="editor-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4.93M14 11a5 5 0 0 0-7.07 0l-2.83 2.83a5 5 0 0 0 7.07 7.07L13 19.07"/></svg>
            </button>
            <button class="editor-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 3v18M3 8h5"/></svg>
            </button>
          </div>
          <div class="editor-body" contenteditable="true" data-placeholder="請輸入內文"></div>
        </div>

        <div class="card-section flex gap-3">
          <button class="btn btn-primary">保存更改</button>
          <a class="btn btn-secondary" href="copywriting.html">取消</a>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
