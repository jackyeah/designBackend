<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>編輯任務設置 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'task-settings-edit', label: '任務設置', href: 'task-settings-edit.html' };
  window.PAGE_BREADCRUMB = ['任務管理', '任務設置', '編輯'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="task" data-subactive="task-settings"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="card">
        <div class="card-section">
          <div style="display:flex; justify-content:flex-end; gap: var(--space-3); margin-bottom: var(--space-5);">
            <a class="btn btn-secondary" href="task-settings.html">取消</a>
            <button class="btn btn-primary" id="taskSaveBtn" type="button">保存更改</button>
          </div>

          <div class="section-label">基本設定</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label"><span class="required">*</span>站台</label>
              <div class="select-wrap"><select class="select">
                <option>請選擇</option>
                <option selected>Delta站長</option>
                <option>YZ 益兆</option>
                <option>金錢母</option>
              </select></div>
            </div>
            <div class="form-field"><label class="field-label"><span class="required">*</span>任務類型</label>
              <div class="select-wrap"><select class="select" id="taskTypeSelect">
                <option>請選擇</option>
                <option>綁定手機號碼</option>
                <option>加入官方LINE好友</option>
                <option>註冊/綁定Line登入</option>
                <option>分享好友</option>
                <option>加入手機桌面</option>
                <option>完成首次儲值</option>
                <option selected>遊戲任務</option>
              </select></div>
            </div>

            <div class="form-field"><label class="field-label"><span class="required">*</span>任務名稱</label><input class="input" type="text" value="無期限的每週共用2次-2.0"></div>
            <div class="form-field"><label class="field-label"><span class="required">*</span>玩家最低等級要求</label>
              <div class="select-wrap"><select class="select">
                <option>VIP0</option>
                <option selected>VIP1</option>
                <option>VIP2</option>
                <option>VIP3</option>
                <option>VIP4</option>
                <option>VIP5</option>
              </select></div>
            </div>

            <div class="form-field span-2"><label class="field-label">任務簡介</label><textarea class="textarea" placeholder="請輸入">每週可累計完成2次，達成後即可領取獎勵。</textarea></div>

            <div class="form-field">
              <label class="field-label">無結束時間</label>
              <div style="display:flex; align-items:center; gap:8px;">
                <span class="text-sm text-secondary">否</span>
                <span class="switch on" id="noEndSwitch"></span>
                <span class="text-sm text-secondary">是</span>
              </div>
            </div>

            <div class="form-field">
              <label class="field-label"><span class="required">*</span><span id="taskPeriodLabel">開始時間</span></label>
              <div class="field">
                <div class="daterange-trigger" data-daterange-target="drTaskPeriod" id="taskPeriodTrigger">
                  <span class="daterange-text">2026-05-22 15:57:03</span>
                  <svg class="daterange-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                </div>
                <div class="daterange-popover dr-single" id="drTaskPeriod">
                  <div class="dr-presets">
                    <button type="button" class="chip" data-preset="today">今天</button>
                    <button type="button" class="chip" data-preset="7">最近7天</button>
                    <button type="button" class="chip" data-preset="30">最近30天</button>
                    <button type="button" class="chip" data-preset="month">本月</button>
                    <button type="button" class="chip" data-preset="lastmonth">上月</button>
                  </div>
                  <div class="dr-summary"></div>
                  <div class="dr-calendars">
                    <div class="dr-cal" data-cal="left">
                      <div class="dr-cal-header">
                        <button type="button" class="dr-nav" data-nav="prev-year">&laquo;</button>
                        <button type="button" class="dr-nav" data-nav="prev-month">&lsaquo;</button>
                        <span class="dr-cal-title"></span>
                        <span class="dr-nav-spacer"></span>
                      </div>
                      <div class="dr-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
                      <div class="dr-days"></div>
                    </div>
                    <div class="dr-cal" data-cal="right">
                      <div class="dr-cal-header">
                        <span class="dr-nav-spacer"></span>
                        <span class="dr-cal-title"></span>
                        <button type="button" class="dr-nav" data-nav="next-month">&rsaquo;</button>
                        <button type="button" class="dr-nav" data-nav="next-year">&raquo;</button>
                      </div>
                      <div class="dr-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
                      <div class="dr-days"></div>
                    </div>
                  </div>
                  <div class="dr-time-row">
                    <div class="dr-time-group" data-role="start">
                      <span class="dr-time-label">開始時間</span>
                      <div class="dr-time-block" data-role="start">
                        <div class="dr-stepper" data-unit="h"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="00"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                        <span>:</span>
                        <div class="dr-stepper" data-unit="m"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="00"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                        <span>:</span>
                        <div class="dr-stepper" data-unit="s"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="00"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                      </div>
                    </div>
                    <div class="dr-time-group" data-role="end">
                      <span class="dr-time-label">結束時間</span>
                      <div class="dr-time-block" data-role="end">
                        <div class="dr-stepper" data-unit="h"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="23"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                        <span>:</span>
                        <div class="dr-stepper" data-unit="m"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="59"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                        <span>:</span>
                        <div class="dr-stepper" data-unit="s"><button type="button" class="dr-stepper-btn" data-dir="up">&#9650;</button><input class="dr-stepper-val" type="text" inputmode="numeric" maxlength="2" value="59"><button type="button" class="dr-stepper-btn" data-dir="down">&#9660;</button></div>
                      </div>
                    </div>
                  </div>
                  <div class="dr-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-daterange-clear>清除</button>
                    <button type="button" class="btn btn-primary btn-sm" data-daterange-apply>套用</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-field"><label class="field-label"><span class="required">*</span>次數規則</label>
              <div class="select-wrap"><select class="select" id="taskFreqSelect">
                <option>一次性</option>
                <option>每日一次</option>
                <option selected>每週N次</option>
                <option>任務期間N次</option>
              </select></div>
            </div>
            <div class="form-field"><label class="field-label"><span class="required">*</span>次數上限</label><input class="input" type="text" id="taskFreqLimit" value="2"></div>

            <div class="form-field"><label class="field-label">SID白名單</label><textarea class="textarea" placeholder="一行一個 SID"></textarea></div>
            <div class="form-field"><label class="field-label">SID黑名單</label><textarea class="textarea" placeholder="一行一個 SID"></textarea></div>

            <div class="form-field"><label class="field-label"><span class="required">*</span>標題圖片-手機版</label>
              <div class="upload-field">
                <div class="upload-thumb square empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                <div>
                  <button class="btn btn-secondary btn-sm" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    選擇圖片
                  </button>
                  <div class="text-xs text-tertiary mt-2">只能上傳.jpg / .jpeg / .png / .gif / .bmp文件，且不超過8MB，建議寬度406px，高度420px</div>
                </div>
              </div>
            </div>
            <div class="form-field"><label class="field-label"><span class="required">*</span>內文圖片-手機版</label>
              <div class="upload-field">
                <div class="upload-thumb square empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                <div>
                  <button class="btn btn-secondary btn-sm" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    選擇圖片
                  </button>
                  <div class="text-xs text-tertiary mt-2">只能上傳.jpg / .jpeg / .png / .gif / .bmp文件，且不超過8MB，建議寬度981px，高度435px</div>
                </div>
              </div>
            </div>
          </div>

          <div class="section-label mt-6">獎勵/任務條件</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label"><span class="required">*</span>獎勵</label><input class="input" type="text" value="50.00"></div>
            <div class="form-field"><label class="field-label"><span class="required">*</span>流水倍數</label><input class="input" type="text" value="1"></div>

            <div class="form-field span-2"><label class="field-label">流水限大類</label>
              <div class="select-wrap"><select class="select"><option selected>不限大類</option></select></div>
            </div>

            <div class="form-field span-2">
              <div class="radio-group mb-3">
                <label class="radio-field"><input type="radio" name="taskRewardScope" id="scopePlatform" checked>指定平台</label>
                <label class="radio-field"><input type="radio" name="taskRewardScope" id="scopeGame">指定遊戲</label>
              </div>

              <div id="scopePlatformFields" class="form-grid" style="margin-bottom: var(--space-4);">
                <div class="form-field"><label class="field-label"><span class="required">*</span>遊戲平台</label>
                  <div class="combo-select" data-combo-select>
                    <input class="combo-select-input" type="text" value="共用（全平台）" autocomplete="off">
                    <div class="combo-select-menu">
                      <div class="combo-select-option">請選擇遊戲平台</div>
                      <div class="combo-select-option is-selected">共用（全平台）</div>
                      <div class="combo-select-option">ATG</div>
                      <div class="combo-select-option">BNG</div>
                      <div class="combo-select-option">RK5</div>
                      <div class="combo-select-option">RSG</div>
                      <div class="combo-select-option">PG</div>
                      <div class="combo-select-option">TU</div>
                      <div class="combo-select-option">SPLUS</div>
                      <div class="combo-select-option">ZG</div>
                      <div class="combo-select-option">MOCK</div>
                    </div>
                  </div>
                </div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>有效投注</label><input class="input" type="text" value="100"></div>
              </div>

              <div id="scopeGameFields" class="form-grid hidden">
                <div class="form-field"><label class="field-label"><span class="required">*</span>遊戲平台</label>
                  <div class="combo-select" data-combo-select>
                    <input class="combo-select-input" type="text" placeholder="請選擇遊戲平台" autocomplete="off">
                    <div class="combo-select-menu">
                      <div class="combo-select-option">ATG</div>
                      <div class="combo-select-option">BNG</div>
                      <div class="combo-select-option">RK5</div>
                      <div class="combo-select-option">RSG</div>
                      <div class="combo-select-option">PG</div>
                      <div class="combo-select-option">TU</div>
                      <div class="combo-select-option">SPLUS</div>
                      <div class="combo-select-option">ZG</div>
                      <div class="combo-select-option">MOCK</div>
                    </div>
                  </div>
                </div>
                <div class="form-field"><label class="field-label">遊戲大類</label>
                  <div class="select-wrap"><select class="select"><option selected>無遊戲大類資料</option></select></div>
                </div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>指定遊戲</label>
                  <div class="select-wrap"><select class="select"><option selected>無遊戲資料</option></select></div>
                </div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>有效投注</label><input class="input" type="text" placeholder="請輸入"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
<script>
  (function () {
    var taskTypeSelect = document.getElementById('taskTypeSelect');
    var freqSelect = document.getElementById('taskFreqSelect');
    var freqLimit = document.getElementById('taskFreqLimit');

    function syncFreqFields() {
      var isGameTask = taskTypeSelect.value === '遊戲任務';
      if (!isGameTask) {
        freqSelect.value = '一次性';
        freqSelect.disabled = true;
        freqLimit.value = '1';
        freqLimit.disabled = true;
      } else {
        freqSelect.disabled = false;
        syncFreqLimit();
      }
    }
    function syncFreqLimit() {
      var isOneTime = freqSelect.value === '一次性';
      freqLimit.disabled = isOneTime;
      if (isOneTime) freqLimit.value = '1';
    }
    taskTypeSelect.addEventListener('change', syncFreqFields);
    freqSelect.addEventListener('change', syncFreqLimit);
    syncFreqFields();

    var noEndSwitch = document.getElementById('noEndSwitch');
    var taskPeriodLabel = document.getElementById('taskPeriodLabel');
    var taskPeriodPopover = document.getElementById('drTaskPeriod');
    function applyTaskPeriodMode(isNoEnd) {
      taskPeriodLabel.textContent = isNoEnd ? '開始時間' : '起訖時間';
      taskPeriodPopover.classList.toggle('dr-single', isNoEnd);
    }
    noEndSwitch.addEventListener('click', function () {
      applyTaskPeriodMode(!noEndSwitch.classList.contains('on'));
    });
    applyTaskPeriodMode(noEndSwitch.classList.contains('on'));

    var scopePlatform = document.getElementById('scopePlatform');
    var scopeGame = document.getElementById('scopeGame');
    var scopePlatformFields = document.getElementById('scopePlatformFields');
    var scopeGameFields = document.getElementById('scopeGameFields');
    function syncScope() {
      scopePlatformFields.classList.toggle('hidden', !scopePlatform.checked);
      scopeGameFields.classList.toggle('hidden', !scopeGame.checked);
    }
    scopePlatform.addEventListener('change', syncScope);
    scopeGame.addEventListener('change', syncScope);
  })();
</script>
</body>
</html>
