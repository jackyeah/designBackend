<body>

<div class="app-shell">

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="context-trail prominent mb-4">

            <button class="btn btn-secondary">清除</button>
          </div>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-section">
          <div class="table-toolbar">
            <span class="text-sm text-tertiary">共 2 筆</span>
          </div>

          <div class="table-scroll">

        </div>
