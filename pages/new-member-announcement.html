<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新會員公告設定 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'new-member-announcement', label: '新會員公告設定', href: 'new-member-announcement.html' };
  window.PAGE_BREADCRUMB = ['公告訊息', '新會員公告設定'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="announcement" data-subactive="new-member-announcement"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header"><h1>新會員公告設定</h1></div>

      <div class="card">
        <div class="card-section">
          <div class="filter-bar">
            <div class="field">
              <label class="field-label"><span class="required">*</span>站台</label>
              <div class="select-wrap"><select class="select">
                <option>請選擇</option>
                <option selected>Delta站長</option>
                <option>YZ 益兆</option>
                <option>金錢母</option>
              </select></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-section">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: var(--space-5);">
            <p class="text-sm text-tertiary" style="margin:0;">※ 如在判定時間內無新會員則不顯示公告</p>
            <div id="viewActions">
              <button class="btn btn-secondary btn-sm" type="button" id="editModeBtn">編輯</button>
            </div>
            <div class="hidden flex gap-3 items-center" id="editActions">
              <button class="btn btn-secondary btn-sm" type="button" id="cancelEditBtn">取消</button>
              <button class="btn btn-primary btn-sm" type="button" id="saveEditBtn">保存更改</button>
            </div>
          </div>

          <div class="detail-fields-wrap" id="detailFieldsWrap">
            <div class="form-field is-editable" style="margin-bottom: var(--space-6);">
              <label class="field-label">新會員公告</label>
              <div class="detail-value">是</div>
              <div class="detail-input"><span class="switch on"></span></div>
            </div>

            <div class="form-grid" style="grid-template-columns: repeat(2, 1fr);">
              <div class="form-field is-editable">
                <label class="field-label"><span class="required">*</span>顯示間隔</label>
                <div class="detail-value">15</div>
                <input class="input detail-input" type="text" value="15">
              </div>
              <div class="form-field is-editable">
                <label class="field-label">單位</label>
                <div class="detail-value">分</div>
                <div class="select-wrap detail-input"><select class="select">
                  <option selected>分</option>
                  <option>時</option>
                </select></div>
              </div>
              <div class="form-field is-editable">
                <label class="field-label"><span class="required">*</span>每次顯示時長（分）</label>
                <div class="detail-value">5</div>
                <input class="input detail-input" type="text" value="5">
              </div>
              <div class="form-field is-editable">
                <label class="field-label"><span class="required">*</span>新會員判定時間（時）</label>
                <div class="detail-value">24</div>
                <input class="input detail-input" type="text" value="24">
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
