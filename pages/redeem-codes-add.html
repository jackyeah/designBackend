<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增兌換序號 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'redeem-codes-add', label: '新增兌換序號', href: 'redeem-codes-add.html' };
  window.PAGE_BREADCRUMB = ['優惠活動管理', '兌換序號設置', '新增'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="promotion" data-subactive="redeem-codes"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header">
        <h1>新增兌換序號</h1>
        <a class="btn btn-secondary btn-sm" href="redeem-codes.html">返回列表</a>
      </div>

      <div class="card">
        <div class="card-section">
          <div class="card-section-title">基本設置</div>
          <div class="form-grid">
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>站台</label>
              <div class="select-wrap"><select class="select">
                <option>請選擇</option>
                <option selected>Delta 站長</option>
                <option>YZ 益兆</option>
                <option>金錢母</option>
              </select></div>
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>活動名稱</label>
              <input class="input" type="text" placeholder="請輸入">
            </div>
            <div class="form-field span-2">
              <label class="field-label"><span class="required">*</span>序號類型</label>
              <div class="radio-group">
                <label class="radio-field"><input type="radio" name="codeType">唯一碼 <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"/></svg></label>
                <label class="radio-field"><input type="radio" name="codeType">通用碼 <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="8" r="0.6" fill="currentColor" stroke="none"/></svg></label>
              </div>
              <div class="text-xs text-tertiary mt-2">若選唯一碼，需在此活動新增完成後於資料表操作生成序號。</div>
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>兌換點數</label>
              <input class="input" type="number" placeholder="請輸入">
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>流水倍數</label>
              <input class="input" type="number" placeholder="請輸入">
            </div>
            <div class="form-field">
              <label class="field-label">流水限大類</label>
              <div class="select-wrap"><select class="select">
                <option>請選擇</option>
                <option>電子</option>
                <option>捕魚</option>
                <option>真人</option>
                <option>體育</option>
              </select></div>
            </div>
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>總兌換上限</label>
              <input class="input" type="number" placeholder="請輸入">
              <div class="text-xs text-tertiary mt-2">0 為不限制該序號的總兌換次數。</div>
            </div>
            <div class="form-field span-2">
              <label class="field-label"><span class="required">*</span>有效時間</label>
              <div class="flex items-center gap-3">
                <div class="daterange-trigger" style="flex:1;">
                  <span class="daterange-text">2026-07-17 01:00 ~ 2026-07-17 02:00</span>
                  <svg class="daterange-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
                </div>
                <label class="checkbox-field" style="flex-shrink:0;"><input class="checkbox" type="checkbox">無結束時間</label>
              </div>
            </div>
          </div>
        </div>

        <div class="card-section">
          <div class="card-section-title">兌換條件</div>
          <div class="form-grid">
            <div class="form-field">
              <label class="field-label"><span class="required">*</span>最低等級要求</label>
              <div class="select-wrap"><select class="select">
                <option>VIP0</option>
                <option selected>VIP1</option>
                <option>VIP2</option>
                <option>VIP3</option>
                <option>VIP4</option>
                <option>VIP5</option>
              </select></div>
            </div>
            <div class="form-field">
              <label class="field-label">註冊天數</label>
              <input class="input" type="number" placeholder="請輸入">
            </div>
            <div class="form-field">
              <label class="field-label">兌換條件</label>
              <div class="flex gap-3" style="height:36px; align-items:center;">
                <label class="checkbox-field"><input class="checkbox" type="checkbox">需綁定手機號</label>
                <label class="checkbox-field"><input class="checkbox" type="checkbox">需完成首儲</label>
              </div>
            </div>
            <div class="form-field span-2">
              <label class="field-label">SID 黑名單</label>
              <textarea class="textarea" placeholder="一行一個 SID" style="min-height:100px;"></textarea>
            </div>
          </div>
        </div>

        <div class="card-section flex gap-3">
          <button class="btn btn-primary">保存更改</button>
          <a class="btn btn-secondary" href="redeem-codes.html">取消</a>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
