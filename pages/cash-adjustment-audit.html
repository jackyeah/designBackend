<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資金調整稽核 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'cash-adjustment-audit', label: '稽核', href: 'cash-adjustment-audit.html' };
  window.PAGE_BREADCRUMB = ['現金系統', '資金調整', '稽核'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="cash" data-subactive="cash-adjustment"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header"><h1>資金調整稽核<span class="text-sm text-tertiary" id="auditMeta" style="font-weight:400;margin-left:var(--space-3);">SID：-</span></h1></div>

      <div class="card">
        <div class="card-section">
          <div style="display:flex; justify-content:flex-end; gap: var(--space-3); margin-bottom: var(--space-5);">
            <a class="btn btn-secondary" href="cash-adjustment.html">返回</a>
            <button class="btn btn-danger" type="button" data-modal-target="modalAuditReject">駁回</button>
            <button class="btn btn-success" type="button" data-modal-target="modalAuditApprove">通過</button>
          </div>

          <div class="section-label">帳戶資料</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label">站台</label>
              <div class="detail-value" id="auditSite">-</div>
            </div>
            <div class="form-field"><label class="field-label">SID</label>
              <div class="detail-value" id="auditSid">-</div>
            </div>
            <div class="form-field"><label class="field-label">VIP 等級</label>
              <div class="detail-value" id="auditVip">-</div>
            </div>
          </div>

          <div class="section-label" style="margin-top: var(--space-6);">稽核資訊</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label">建立時間</label>
              <div class="detail-value" id="auditCreated">-</div>
            </div>
            <div class="form-field"><label class="field-label">提案人員</label>
              <div class="detail-value" id="auditProposer">-</div>
            </div>
            <div class="form-field"><label class="field-label">調整項目</label>
              <div class="detail-value" id="auditItem">-</div>
            </div>
          </div>

          <div class="section-label" style="margin-top: var(--space-6);">金額設定</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label">交易金額</label>
              <div class="detail-value" id="auditAmount">-</div>
            </div>
            <div class="form-field"><label class="field-label">調整後點數</label>
              <div class="detail-value" id="auditPoints">-</div>
            </div>
          </div>

          <div class="section-label" style="margin-top: var(--space-6);">打碼量</div>
          <div class="form-grid">
            <div class="form-field"><label class="field-label">流水倍數</label>
              <div class="detail-value" id="auditMultiple">-</div>
            </div>
            <div class="form-field"><label class="field-label">流水限大類</label>
              <div class="detail-value" id="auditCategory">-</div>
            </div>
          </div>

          <div class="section-label" style="margin-top: var(--space-6);">備註</div>
          <div class="form-grid">
            <div class="form-field span-2"><label class="field-label">後台備註</label>
              <textarea class="textarea" id="auditNote" placeholder="請輸入"></textarea>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 通過確認 Modal -->
<div class="modal-overlay" id="modalAuditApprove">
  <div class="modal" style="max-width: 420px;">
    <div class="modal-header"><h2>通過此筆資金調整</h2><button class="modal-close" data-modal-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="modal-body">
      <p class="text-sm text-secondary" style="line-height: 1.7;">通過後此筆資金調整將完成派發，確認要通過嗎？</p>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-modal-close>取消</button><button class="btn btn-success" id="auditApproveConfirmBtn" data-modal-close>確認通過</button></div>
  </div>
</div>

<!-- 駁回確認 Modal -->
<div class="modal-overlay" id="modalAuditReject">
  <div class="modal" style="max-width: 420px;">
    <div class="modal-header"><h2>駁回此筆資金調整</h2><button class="modal-close" data-modal-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="modal-body">
      <p class="text-sm text-secondary" style="line-height: 1.7;">駁回後此筆資金調整將不會派發，確認要駁回嗎？</p>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" data-modal-close>取消</button><button class="btn btn-danger" id="auditRejectConfirmBtn" data-modal-close>確認駁回</button></div>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    document.getElementById('auditMeta').textContent = 'SID：' + (params.get('sid') || '-');
    document.getElementById('auditSite').textContent = params.get('site') || '-';
    document.getElementById('auditSid').textContent = params.get('sid') || '-';
    document.getElementById('auditVip').textContent = params.get('vip') || '-';
    document.getElementById('auditCreated').textContent = params.get('created') || '-';
    document.getElementById('auditProposer').textContent = params.get('proposer') || '-';
    document.getElementById('auditItem').textContent = params.get('item') || '-';
    document.getElementById('auditAmount').textContent = params.get('amount') || '-';
    document.getElementById('auditPoints').textContent = params.get('points') || '-';
    document.getElementById('auditMultiple').textContent = params.get('multiple') || '-';
    document.getElementById('auditCategory').textContent = params.get('category') || '-';
    document.getElementById('auditNote').value = params.get('note') || '';

    document.getElementById('auditApproveConfirmBtn').addEventListener('click', function () {
      window.showToast('已通過，資金調整完成派發');
      setTimeout(function () { window.location.href = 'cash-adjustment.html'; }, 900);
    });
    document.getElementById('auditRejectConfirmBtn').addEventListener('click', function () {
      window.showToast('已駁回此筆資金調整');
      setTimeout(function () { window.location.href = 'cash-adjustment.html'; }, 900);
    });
  })();
</script>
</body>
</html>
