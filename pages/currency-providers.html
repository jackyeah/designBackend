<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幣商設定 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'currency-providers', label: '幣商設定', href: 'currency-providers.html' };
  window.PAGE_BREADCRUMB = ['帳號管理', '幣商設定'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="account" data-subactive="currency-providers"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header"><h1>幣商設定</h1></div>

      <div class="card">
        <div class="card-section">
          <div class="filter-bar">
            <div class="field"><label class="field-label">幣商代碼</label><input class="input" type="text" placeholder="請輸入"></div>
            <div class="field"><label class="field-label">名稱</label><input class="input" type="text" placeholder="請輸入"></div>
            <div class="field"><label class="field-label">所屬站別</label>
              <div class="select-wrap"><select class="select"><option>請選擇</option><option>金錢母</option><option>YZ 益兆</option><option>Gamma 站</option></select></div>
            </div>
            <div class="field"><label class="field-label">狀態</label>
              <div class="select-wrap"><select class="select"><option>請選擇</option><option>啟用</option><option>停用</option></select></div>
            </div>
          </div>
          <div class="filter-actions">
            <button class="btn btn-primary">搜尋</button>
            <button class="btn btn-secondary">清除</button>
          </div>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-section">
          <div class="table-toolbar">
            <a class="btn btn-accent" href="currency-provider-edit.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
              新增
            </a>
            <span class="spacer"></span>
            <span class="text-sm text-tertiary">共 5 筆</span>
          </div>

          <div class="table-scroll">
            <table class="data-table">
              <thead><tr><th>幣商代碼</th><th>名稱</th><th>所屬站別</th><th>幣別</th><th>綁定 SID 數</th><th>狀態</th><th>創建時間</th><th>操作</th></tr></thead>
              <tbody>
                <tr><td>MOPAY</td><td>速匯通</td><td>金錢母</td><td>新臺幣</td><td>3</td><td><span class="badge badge-success">啟用</span></td><td>2026-05-10 11:20:33</td><td class="col-actions"><a class="btn-link" href="currency-provider-edit.html">編輯</a></td></tr>
                <tr><td>QPAY</td><td>快付通</td><td>金錢母</td><td>新臺幣</td><td>2</td><td><span class="badge badge-success">啟用</span></td><td>2026-04-28 09:41:07</td><td class="col-actions"><a class="btn-link" href="currency-provider-edit.html">編輯</a></td></tr>
                <tr><td>YZPAY</td><td>益兆支付</td><td>YZ 益兆</td><td>新臺幣</td><td>4</td><td><span class="badge badge-success">啟用</span></td><td>2026-03-15 15:52:41</td><td class="col-actions"><a class="btn-link" href="currency-provider-edit.html">編輯</a></td></tr>
                <tr><td>GMPAY</td><td>Gamma Pay</td><td>Gamma 站</td><td>美元</td><td>1</td><td><span class="badge badge-danger">停用</span></td><td>2026-02-02 10:07:19</td><td class="col-actions"><a class="btn-link" href="currency-provider-edit.html">編輯</a></td></tr>
                <tr><td>DTPAY</td><td>Delta Pay</td><td>Delta 站</td><td>越南盾</td><td>2</td><td><span class="badge badge-success">啟用</span></td><td>2025-12-20 08:33:52</td><td class="col-actions"><a class="btn-link" href="currency-provider-edit.html">編輯</a></td></tr>
              </tbody>
            </table>
          </div>
          <!-- 資料未超過一頁，依規範不顯示分頁器 -->
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
