<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊戲權限 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.CURRENT_TAB = { key: 'site-owner-game-permissions', label: '遊戲權限 - jgm7', href: 'site-owner-game-permissions.html' };
  window.PAGE_BREADCRUMB = ['帳號管理', '站長管理', '遊戲權限'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="account" data-subactive="site-owners"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header">
        <h1>遊戲權限</h1>
        <button class="btn btn-primary btn-sm">保存更改</button>
      </div>

      <div class="card">
        <div class="card-section" style="padding-bottom:0;">
          <div class="detail-item" style="margin-bottom: var(--space-4);">
            <span class="detail-label">站長代碼</span>
            <span class="detail-value">jgm7 · 金錢母</span>
          </div>
        </div>

        <div class="card-section">
          <div class="table-scroll">
            <table class="data-table">
              <thead><tr><th style="width:180px;">遊戲平台</th><th>遊戲類型</th><th style="width:120px;">遊戲狀態</th></tr></thead>
              <tbody>
                <tr><td>MOCK</td><td>電子</td><td><span class="switch"></span></td></tr>
                <tr><td rowspan="2">RSG</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td>街機</td><td><span class="switch on"></span></td></tr>
                <tr><td>ATG</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td rowspan="3">TU</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td>街機</td><td><span class="switch on"></span></td></tr>
                <tr><td>捕魚</td><td><span class="switch on"></span></td></tr>
                <tr><td>SPLUS</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td>PG</td><td>電子</td><td><span class="switch"></span></td></tr>
                <tr><td>RK5</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td>BNG</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td rowspan="2">ZG</td><td>電子</td><td><span class="switch on"></span></td></tr>
                <tr><td>捕魚</td><td><span class="switch on"></span></td></tr>
              </tbody>
            </table>
          </div>
          <!-- 資料未超過一頁，依規範不顯示分頁器 -->
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
