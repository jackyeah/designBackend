<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員註冊設定 - 後台管理系統</title>
<link rel="stylesheet" href="../css/tokens.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<script>
  window.PAGE_TABS = [
    { label: '會員管理', href: 'members.html' },
    { label: '會員註冊設定', href: 'member-registration.html', active: true }
  ];
  window.PAGE_BREADCRUMB = ['帳號管理', '會員註冊設定'];
</script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="sidebar" data-active="account" data-subactive="member-registration"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>
    <div class="tabsbar" id="tabsbar"></div>

    <main class="content">
      <div id="breadcrumb-mount"></div>

      <div class="page-header"><h1>會員註冊設定</h1></div>

      <!-- 站台清單與設定表單合併於同一頁，避免兩頁內容都太空 -->
      <div class="card">
        <div class="card-section">
          <div class="split-layout">
            <div class="settings-list">
              <div class="settings-list-item active">
                <span class="settings-list-item-name">金錢母<span class="settings-list-item-sub">jgm7</span></span>
                <span class="badge badge-success">啟用</span>
              </div>
              <div class="settings-list-item">
                <span class="settings-list-item-name">金錢母示範站<span class="settings-list-item-sub">GdemoAdmin</span></span>
                <span class="badge badge-success">啟用</span>
              </div>
              <div class="settings-list-item">
                <span class="settings-list-item-name">Gamma 站<span class="settings-list-item-sub">GammaAdmin</span></span>
                <span class="badge badge-success">啟用</span>
              </div>
              <div class="settings-list-item">
                <span class="settings-list-item-name">YZ 益兆<span class="settings-list-item-sub">YzAdmin</span></span>
                <span class="badge badge-success">啟用</span>
              </div>
              <div class="settings-list-item">
                <span class="settings-list-item-name">YZ示範站<span class="settings-list-item-sub">QdemoAdmin</span></span>
                <span class="badge badge-danger">停用</span>
              </div>
              <div class="settings-list-item">
                <span class="settings-list-item-name">Delta 站<span class="settings-list-item-sub">DeltaAdmin</span></span>
                <span class="badge badge-success">啟用</span>
              </div>
            </div>

            <div class="settings-divider"></div>

            <div class="settings-panel">
              <div class="card-section-title">金錢母 · 註冊規則</div>
              <div class="form-grid">
                <div class="form-field"><label class="field-label"><span class="required">*</span>預設幣別</label><div class="select-wrap"><select class="select"><option>新臺幣</option><option>美元</option></select></div></div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>預設語系</label><div class="select-wrap"><select class="select"><option>繁體中文</option><option>English</option></select></div></div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>密碼強度要求</label><div class="select-wrap"><select class="select"><option>需含英數混合，至少 8 碼</option><option>純數字，至少 6 碼</option></select></div></div>
                <div class="form-field"><label class="field-label"><span class="required">*</span>每日註冊上限</label><input class="input" type="text" value="500"></div>
                <div class="form-field"><label class="field-label">註冊贈點金額</label><input class="input" type="text" value="100"></div>
                <div class="form-field"><label class="field-label">註冊贈點幣別</label><div class="select-wrap"><select class="select"><option>新臺幣</option><option>美元</option></select></div></div>
              </div>

              <div class="card-section-title mt-4">必填驗證項目</div>
              <div class="detail-grid cols-4" style="margin-bottom: var(--space-2);">
                <label class="checkbox-field"><input class="checkbox" type="checkbox" checked>手機驗證</label>
                <label class="checkbox-field"><input class="checkbox" type="checkbox" checked>Email 驗證</label>
                <label class="checkbox-field"><input class="checkbox" type="checkbox">實名認證</label>
                <label class="checkbox-field"><input class="checkbox" type="checkbox" checked>邀請碼必填</label>
              </div>

              <div class="card-section-title mt-4">狀態</div>
              <span class="segmented">停用 <span class="switch on"></span> 啟用</span>

              <div class="mt-4" style="border-top:1px solid var(--color-border); padding-top: var(--space-4);">
                <button class="btn btn-primary">保存更改</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="../js/shell.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
